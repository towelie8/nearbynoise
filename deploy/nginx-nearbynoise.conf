server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name laerm.example.org;
    # ssl_certificate lines are added by certbot
    auth_basic "Laermprotokoll";
    auth_basic_user_file /etc/nginx/.htpasswd-nearbynoise;
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }
}
